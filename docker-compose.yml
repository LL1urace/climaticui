services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klimatika-app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://host.docker.internal:8000/api/v1}
      APP_TITLE: ${APP_TITLE:-КлиматикА}
      APP_ENV: ${APP_ENV:-dev}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      USE_SAMPLE_DATA: ${USE_SAMPLE_DATA:-true}
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

