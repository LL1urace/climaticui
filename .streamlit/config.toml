[theme]
# Основная палитра (фиолетовая тема)
primaryColor = "#7c3aed"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f3ff"
textColor = "#1f2937"

# Шрифт
font = "sans serif"

[server]
# Настройки сервера
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true

[browser]
# Настройки браузера
gatherUsageStats = false

[mapbox]
# Token для карт (если будет использоваться)
token = ""
